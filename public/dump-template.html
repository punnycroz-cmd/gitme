<!doctype html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><!-- SSR_TITLE --></title>
  <link rel="stylesheet" href="/style.css">
  <script>
    (function () {
      var saved = localStorage.getItem('tinyhub-theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'twilight');
      }
    })();
  </script>
  <style>
    .dump-chips {
      display: flex;
      gap: 8px;
      margin-left: 20px;
      align-items: center;
    }

    .dump-chip {
      background: var(--bg-glass-inset);
      border: 1px solid var(--border-glass);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-weight: 500;
    }

    .dump-banner.delta-banner {
      background: rgba(129, 140, 248, 0.1);
      border: 1px dashed var(--accent);
      color: var(--text);
      padding: 16px 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 13px;
      line-height: 1.5;
    }

    .dump-banner.delta-banner strong {
      color: var(--accent);
    }

    .dump-banner.delta-banner code {
      background: var(--bg-glass-inset);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, monospace;
    }

    .dump-path {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dump-section.collapsed .dump-code {
      display: none;
    }

    .dump-section.collapsed .dump-path {
      border-bottom: none;
    }
  </style>
</head>

<body class="dump-page">
  <header>
    <h1 style="display: flex; align-items: center;">
      <a href="/" style="display: inline-flex; align-items: center; text-decoration: none; color: inherit;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent); margin-right: 8px;">
          <path
            d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4">
          </path>
          <path d="M9 18c-4.51 2-5-2-7-2"></path>
        </svg>
        <!-- SSR_TITLE -->
      </a>
    </h1>
    <!-- SSR_DUMP_CHIPS -->
    <div id="dump-freshness" style="font-size: 11px; color: var(--text-muted); margin-left: 20px;"></div>
    <div class="dump-actions">
      <button class="copy-btn" onclick="dumpCopyAll()" style="display: inline-flex;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        Copy All
      </button>
      <a class="copy-btn" href="<!-- SSR_BROWSER_URL -->" style="display: inline-flex; text-decoration: none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6"></path>
          <path d="M10 14 21 3"></path>
          <path d="M18 13v6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h7"></path>
        </svg>
        Browser
      </a>
      <a class="copy-btn" id="delta-link" href="#" style="display: inline-flex; text-decoration: none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Delta
      </a>
    </div>
  </header>

  <!-- SSR_DUMP_BANNER -->

  <main class="dump-main">
    <!-- SSR_DUMP_CONTENT -->
  </main>

  <textarea id="raw-dump-text" style="display: none;"><!-- SSR_RAW_DUMP_TEXT --></textarea>

  <script>
    function dumpCopyAll() {
      const textarea = document.getElementById('raw-dump-text');
      if (!textarea) return;
      navigator.clipboard.writeText(textarea.value).then(() => {
        const btn = document.querySelector('.dump-actions .copy-btn');
        const orig = btn.innerHTML;
        btn.innerHTML = '✓ Copied!';
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
      }).catch(() => {
        alert('Clipboard blocked — select the page and copy manually (Cmd/Ctrl+A, Cmd/Ctrl+C).');
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const commit = "<!-- SSR_COMMIT_HASH -->";
      const pushedAt = "<!-- SSR_COMMIT_CREATED_AT -->";
      const freshnessEl = document.getElementById('dump-freshness');
      if (freshnessEl) {
        freshnessEl.textContent = `commit ${commit} · pushed ${pushedAt || 'unknown'} · rendered ${new Date().toLocaleString()}`;
      }

      const deltaLink = document.getElementById('delta-link');
      if (deltaLink) {
        const url = new URL(window.location.href);
        url.searchParams.set('mode', 'delta');
        url.searchParams.set('since', 'last');
        url.searchParams.delete('v');
        deltaLink.href = url.pathname + url.search;
      }

      document.querySelectorAll('.dump-path').forEach(header => {
        const iconSpan = document.createElement('span');
        iconSpan.className = 'collapse-icon';
        iconSpan.style.transition = 'transform 0.2s';
        iconSpan.style.transform = 'rotate(90deg)';
        iconSpan.style.fontSize = '12px';
        iconSpan.style.color = 'var(--text-muted)';
        iconSpan.style.marginLeft = 'auto';
        iconSpan.textContent = '▸';
        header.appendChild(iconSpan);
      });

      document.addEventListener('click', (e) => {
        const header = e.target.closest('.dump-path');
        if (header) {
          const section = header.closest('.dump-section');
          if (section) {
            section.classList.toggle('collapsed');
            const icon = header.querySelector('.collapse-icon');
            if (icon) {
              if (section.classList.contains('collapsed')) {
                icon.style.transform = 'rotate(0deg)';
              } else {
                icon.style.transform = 'rotate(90deg)';
              }
            }
          }
        }
      });
    });
  </script>
</body>

</html>
